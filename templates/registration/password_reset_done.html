

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تغییر رمز عبور</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Vazirmatn', Tahoma, sans-serif;
}

:root{
    --bg:#0c0e12;
    --bg-elevated:#15181e;
    --surface:#1b1f27;
    --border:#2a2f3a;
    --border-soft:#232730;
    --gold:#d4af37;
    --gold-bright:#f0c75e;
    --teal:#1f6f5c;
    --teal-bright:#2f9c81;
    --text-primary:#ece9e2;
    --text-secondary:#a3a8b4;
}

body{
    background-color:var(--bg);
    color:var(--text-primary);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    direction:rtl;
    background-image:
        radial-gradient(circle at 20% 0%, rgba(212,175,55,0.06), transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(31,111,92,0.1), transparent 45%),
        url("data:image/svg+xml,%3Csvg width='84' height='84' viewBox='0 0 84 84' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23d4af37' stroke-opacity='0.045'%3E%3Cpath d='M42 0 L84 42 L42 84 L0 42 Z'/%3E%3Ccircle cx='42' cy='42' r='18'/%3E%3C/g%3E%3C/svg%3E");
    padding:20px;
}

.success-card{
    width:100%;
    max-width:500px;
    background:var(--surface);
    padding:44px 30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.5);
    border:1px solid var(--border-soft);
    border-top:3px solid var(--teal-bright);
}

.icon{
    width:90px;
    height:90px;
    margin:0 auto 20px;
    border-radius:50%;
    border:2px solid var(--teal-bright);
    background:rgba(47,156,129,0.12);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:42px;
    color:var(--teal-bright);
}

h1{
    color:#fff;
    margin-bottom:15px;
    font-size:1.7rem;
    font-weight:800;
}

p{
    color:var(--text-secondary);
    line-height:2;
    margin-bottom:30px;
}

.login-btn{
    display:inline-block;
    text-decoration:none;
    background:linear-gradient(135deg, var(--gold-bright), var(--gold));
    color:#14110a;
    font-weight:700;
    padding:12px 30px;
    border-radius:10px;
    transition:.3s;
}

.login-btn:hover{
    filter:brightness(1.08);
    box-shadow:0 8px 22px rgba(212,175,55,0.3);
    transform:translateY(-1px);
}
</style>
</head>
<body>
    <div class="success-card">
        <div class="icon">
            ✓
        </div>
        <h1>لینک ارسال شد</h1>
        <p>
             از طریق لینک وارد شوید و رمز جدید خود را بسازید
        </p>
        <a href="{% url 'login' %}" class="login-btn">
            ورود به حساب کاربری
        </a>
    </div>
</body>
</html>
